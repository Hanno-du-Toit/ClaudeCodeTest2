<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5rem;
      color: #a0c4ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3.5rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
      border: 2px solid #0f3460;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #ff6b9d; }
    .cell.o { color: #00d4ff; }

    .cell.win {
      background: #1a3a5c;
      border-color: #f7c59f;
      animation: pulse 0.6s ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    #score {
      display: flex;
      gap: 2rem;
      margin-top: 2rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
    }

    .score-box .label { color: #888; font-size: 0.8rem; letter-spacing: 0.05em; }
    .score-box .val { font-size: 1.6rem; font-weight: 700; margin-top: 2px; }
    .score-box.x-score .val { color: #ff6b9d; }
    .score-box.o-score .val { color: #00d4ff; }
    .score-box.draw-score .val { color: #aaa; }

    #reset {
      margin-top: 1.8rem;
      padding: 0.65rem 2.2rem;
      font-size: 1rem;
      font-weight: 700;
      background: #0f3460;
      color: #e0e0ff;
      border: 2px solid #a0c4ff;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #1a5276;
      transform: scale(1.04);
    }

    #mode-toggle {
      margin-top: 0.8rem;
      padding: 0.45rem 1.4rem;
      font-size: 0.85rem;
      font-weight: 600;
      background: transparent;
      color: #888;
      border: 1px solid #333;
      border-radius: 6px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    #mode-toggle:hover { color: #aaa; border-color: #666; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="score">
    <div class="score-box x-score">
      <div class="label">X WINS</div>
      <div class="val" id="score-x">0</div>
    </div>
    <div class="score-box draw-score">
      <div class="label">DRAWS</div>
      <div class="val" id="score-d">0</div>
    </div>
    <div class="score-box o-score">
      <div class="label">O WINS</div>
      <div class="val" id="score-o">0</div>
    </div>
  </div>
  <button id="reset">New Game</button>
  <button id="mode-toggle">vs CPU: OFF</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board, current, gameOver, vsCPU;
    let scores = { X: 0, O: 0, D: 0 };

    const boardEl   = document.getElementById('board');
    const statusEl  = document.getElementById('status');
    const resetBtn  = document.getElementById('reset');
    const modeBtn   = document.getElementById('mode-toggle');
    const scoreX    = document.getElementById('score-x');
    const scoreO    = document.getElementById('score-o');
    const scoreD    = document.getElementById('score-d');

    function init() {
      board = Array(9).fill(null);
      current = 'X';
      gameOver = false;
      render();
      statusEl.textContent = "X's turn";
      if (vsCPU && current === 'O') scheduleCPU();
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val || '';
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i] || (vsCPU && current === 'O')) return;
      place(i, current);
    }

    function place(i, player) {
      board[i] = player;
      render();
      const result = checkResult();
      if (result) return finish(result);
      current = current === 'X' ? 'O' : 'X';
      statusEl.textContent = `${current}'s turn`;
      if (vsCPU && current === 'O' && !gameOver) scheduleCPU();
    }

    function scheduleCPU() {
      setTimeout(() => {
        if (!gameOver) place(cpuMove(), 'O');
      }, 350);
    }

    function cpuMove() {
      // Win if possible
      for (const [a,b,c] of WINS) {
        const line = [board[a], board[b], board[c]];
        if (line.filter(v => v === 'O').length === 2 && line.includes(null))
          return [a,b,c][line.indexOf(null)];
      }
      // Block X from winning
      for (const [a,b,c] of WINS) {
        const line = [board[a], board[b], board[c]];
        if (line.filter(v => v === 'X').length === 2 && line.includes(null))
          return [a,b,c][line.indexOf(null)];
      }
      // Prefer center, then corners, then edges
      const order = [4, 0, 2, 6, 8, 1, 3, 5, 7];
      return order.find(i => !board[i]);
    }

    function checkResult() {
      for (const combo of WINS) {
        const [a,b,c] = combo;
        if (board[a] && board[a] === board[b] && board[a] === board[c])
          return { winner: board[a], combo };
      }
      if (board.every(Boolean)) return { winner: null };
      return null;
    }

    function finish({ winner, combo }) {
      gameOver = true;
      if (winner) {
        statusEl.textContent = `${winner} wins!`;
        scores[winner]++;
        combo.forEach(i => boardEl.children[i].classList.add('win'));
      } else {
        statusEl.textContent = "It's a draw!";
        scores.D++;
      }
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    resetBtn.addEventListener('click', init);
    modeBtn.addEventListener('click', () => {
      vsCPU = !vsCPU;
      modeBtn.textContent = `vs CPU: ${vsCPU ? 'ON' : 'OFF'}`;
      scores = { X: 0, O: 0, D: 0 };
      scoreX.textContent = scoreO.textContent = scoreD.textContent = 0;
      init();
    });

    vsCPU = false;
    init();
  </script>
</body>
</html>
